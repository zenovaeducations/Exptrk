<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="stylesheet"
          href="style.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
          rel="stylesheet">

</head>

<body>

<div class="app">

<!-- ===========================
HEADER
============================ -->

<header>

    <div>

        <h2>Hello 👋</h2>

        <p>Track Every Rupee You Spend</p>

    </div>

    <span class="material-icons profile">

        account_circle

    </span>

</header>

<!-- ===========================
BALANCE CARD
============================ -->

<section class="balance-card">

    <div class="balance-top">

        <div>

            <span class="balance-title">

                Total Balance

            </span>

            <h1 id="balance">

                ₹0

            </h1>

        </div>

        <div class="wallet-icon">

            💰

        </div>

    </div>

    <div class="income-expense">

        <div class="income-box">

            <p>

                Income

            </p>

            <h3 id="income">

                ₹0

            </h3>

        </div>

        <div class="expense-box">

            <p>

                Expense

            </p>

            <h3 id="expense">

                ₹0

            </h3>

        </div>

    </div>

</section>


<section class="transactions">

    <div class="title">

        <h3>

            Recent Transactions

        </h3>

    

    </div>

    <div id="transactionList">

        <!-- Transactions will load here -->

    </div>

</section>

<!-- ===========================
FLOATING BUTTON
============================ -->

<button

    class="fab"

    id="fab"

>

    +

</button>

<!-- ===========================
ADD / EDIT TRANSACTION POPUP
============================ -->

<div

    class="popup"

    id="popup"

>

<div class="popup-box">

    <h2>

        Add Transaction

    </h2>

    <input

        type="number"

        id="amount"

        placeholder="Enter Amount"

    >

    <select id="type">

        <option value="Expense">

            Expense

        </option>

        <option value="Income">

            Income

        </option>

    </select>

    <select id="category">

        <option>Food</option>

        <option>Groceries</option>

        <option>Bus</option>

        <option>Train</option>

        <option>Flight</option>

        <option>Fuel</option>

        <option>Shopping</option>

        <option>Medical</option>

        <option>Entertainment</option>

        <option>Recharge</option>

        <option>Electricity</option>

        <option>Rent</option>

        <option>Salary</option>

        <option>Business</option>

        <option>Investment</option>

        <option>Gift</option>

        <option>Education</option>

        <option>Other</option>

    </select>

    <input

        type="date"

        id="date"

    >

    <textarea

        id="note"

        placeholder="Write a note"

    ></textarea>

    <button

        id="saveTransaction"

    >

        Save Transaction

    </button>

</div>

</div>
  <!-- ===========================
FIREBASE CONFIG
============================ -->

<script
    type="module"
    src="firebase-config.js">
</script>

<!-- ===========================
MAIN SCRIPT
============================ -->

<script
    type="module"
    src="script.js">
</script>

</div>

</body>

</html>
