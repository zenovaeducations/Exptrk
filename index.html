<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link rel="stylesheet"
          href="style.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
          rel="stylesheet">

</head>

<body>

<div class="app">

<!-- ===========================
HEADER
============================ -->

<header>

    <div>

        <h2>Hello 👋</h2>

        <p>Track Every Rupee You Spend</p>

    </div>

    <span class="material-icons profile">

        account_circle

    </span>

</header>

<!-- ===========================
BALANCE CARD
============================ -->

<section class="balance-card">

    <p>Total Balance</p>

    <h1 id="balance">

        ₹0

    </h1>

    <div class="income-expense">

        <div>

            <p>Total Income</p>

            <h3 id="income">

                ₹0

            </h3>

        </div>

        <div>

            <p>Total Expense</p>

            <h3 id="expense">

                ₹0

            </h3>

        </div>

    </div>

</section>

<!-- ===========================
QUICK ACTION BUTTONS
============================ -->

<section class="quick-actions">

    <button id="addIncome">

        <span class="material-icons">

            add_circle

        </span>

        Add Income

    </button>

    <button id="addExpense">

        <span class="material-icons">

            remove_circle

        </span>

        Add Expense

    </button>

</section>

<!-- ===========================
SUMMARY CARDS
============================ -->

<section class="summary">

    <div class="summary-card">

        <h4>Today's Expense</h4>

        <h2 id="todayExpense">

            ₹0

        </h2>

    </div>

    <div class="summary-card">

        <h4>This Month</h4>

        <h2 id="monthExpense">

            ₹0

        </h2>

    </div>

</section>

<!-- ===========================
SEARCH
============================ -->

<section class="search-box">

    <input

        type="text"

        placeholder="Search transactions..."

        onkeyup="searchTransactions(this.value)"

    >

</section>
  <!-- ===========================
FILTERS
============================ -->

<section class="filters">

    <button onclick="filterType('All')">

        All

    </button>

    <button onclick="filterType('Income')">

        Income

    </button>

    <button onclick="filterType('Expense')">

        Expense

    </button>

</section>

<!-- ===========================
TRANSACTIONS
============================ -->

<section class="transactions">

    <div class="title">

        <h3>

            Recent Transactions

        </h3>

        <button onclick="exportCSV()">

            Export CSV

        </button>

    </div>

    <div id="transactionList">

        <!-- Transactions will load here -->

    </div>

</section>

<!-- ===========================
FLOATING BUTTON
============================ -->

<button

    class="fab"

    id="fab"

>

    +

</button>

<!-- ===========================
ADD / EDIT TRANSACTION POPUP
============================ -->

<div

    class="popup"

    id="popup"

>

<div class="popup-box">

    <h2>

        Add Transaction

    </h2>

    <input

        type="number"

        id="amount"

        placeholder="Enter Amount"

    >

    <select id="type">

        <option value="Expense">

            Expense

        </option>

        <option value="Income">

            Income

        </option>

    </select>

    <select id="category">

        <option>Food</option>

        <option>Groceries</option>

        <option>Bus</option>

        <option>Train</option>

        <option>Flight</option>

        <option>Fuel</option>

        <option>Shopping</option>

        <option>Medical</option>

        <option>Entertainment</option>

        <option>Recharge</option>

        <option>Electricity</option>

        <option>Rent</option>

        <option>Salary</option>

        <option>Business</option>

        <option>Investment</option>

        <option>Gift</option>

        <option>Education</option>

        <option>Other</option>

    </select>

    <input

        type="date"

        id="date"

    >

    <textarea

        id="note"

        placeholder="Write a note"

    ></textarea>

    <button

        id="saveTransaction"

    >

        Save Transaction

    </button>

</div>

</div>
  <!-- ===========================
FIREBASE CONFIG
============================ -->

<script
    type="module"
    src="firebase-config.js">
</script>

<!-- ===========================
MAIN SCRIPT
============================ -->

<script
    type="module"
    src="script.js">
</script>

</div>

</body>

</html>
